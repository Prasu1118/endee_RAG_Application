version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_API_KEY=${APP_API_KEY}
      - ENDEE_URL=http://endee-server:8080
      - DEBUG=False
    depends_on:
      - endee-server
    volumes:
      - ./logs:/app/logs

  endee-server:
    image: endeeio/endee-server:latest
    ports:
      - "8080:8080"
    volumes:
      - ./endee-data:/data
    restart: always

volumes:
  endee-data:
